services:
  postgres:
    image: postgres:17
    container_name: nav-epj-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nav-epj
    ports:
      - "5434:5432"

  valkey:
    image: valkey/valkey:8-alpine
    container_name: nav-epj-valkey
    ports:
      - "6379:6379"
    restart: unless-stopped
